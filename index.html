<html lang="zh-Hant">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="default"/>
<meta name="apple-mobile-web-app-title" content="名古屋之旅"/>
<title>名古屋之旅 2026</title>
<style>
:root{
  --sakura:#f9b4c0;--sakura-l:#fff0f3;--rose:#d44f6a;
  --amber:#f5a623;--green:#4aad8a;--blue:#3a7ec2;--purple:#8a6fd4;
  --ink:#22201e;--muted:#756e68;--line:#ede4df;
  --bg:#fdf8f6;--card:#ffffff;
  --shadow:0 4px 20px rgba(80,30,40,.09);
  --r:16px;--nav-h:62px;--safe-b:env(safe-area-inset-bottom,0px);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0;}
html,body{height:100%;background:var(--bg);}
body{font-family:-apple-system,BlinkMacSystemFont,"PingFang TC","Noto Sans TC",sans-serif;color:var(--ink);line-height:1.55;overscroll-behavior:none;}
button{cursor:pointer;font-family:inherit;}
a{color:inherit;text-decoration:none;}

/* LAYOUT */
#app{display:flex;flex-direction:column;height:100dvh;max-width:600px;margin:0 auto;position:relative;}
#top-bar{flex:0 0 auto;background:linear-gradient(160deg,#fff5f0,#fff0f5);border-bottom:1px solid var(--line);padding:14px 16px 0;}
#top-bar h1{font-size:21px;letter-spacing:-.3px;margin-bottom:3px;}
.info-row{display:flex;gap:7px;flex-wrap:wrap;padding:6px 0 0;}
.info-pill{background:#fff;border:1px solid var(--line);border-radius:999px;padding:4px 10px;font-size:11.5px;color:var(--muted);}
.info-pill b{color:var(--rose);}
#day-bar{display:flex;gap:6px;overflow-x:auto;padding:10px 16px 11px;background:linear-gradient(160deg,#fff5f0,#fff0f5);scrollbar-width:none;}
#day-bar::-webkit-scrollbar{display:none;}
.day-tab{flex:0 0 auto;padding:7px 13px;border-radius:999px;border:1.5px solid var(--line);background:#fff;font-size:12px;font-weight:700;color:var(--muted);transition:all .2s;line-height:1.3;text-align:center;}
.day-tab.active{background:var(--rose);border-color:var(--rose);color:#fff;}
#content{flex:1 1 0;overflow-y:auto;-webkit-overflow-scrolling:touch;padding-bottom:calc(var(--nav-h) + var(--safe-b) + 8px);}
.screen{display:none;padding:12px 13px 4px;}
.screen.visible{display:block;}

/* NOTICE / SECTION */
.notice{background:linear-gradient(135deg,#fff8e1,#fff3e6);border:1px solid #f5d49a;border-radius:12px;padding:10px 13px;font-size:13px;margin-bottom:11px;color:#5a3e00;}
.notice b{color:#c06000;}
.notice.blue{background:linear-gradient(135deg,#eef4ff,#e8f0ff);border-color:#b8cfff;color:#1a3068;}
.notice.blue b{color:#1a3068;}
.notice.green{background:linear-gradient(135deg,#edfaf3,#e4f7ec);border-color:#a0d9bc;color:#0d5030;}
.notice.green b{color:#0d5030;}
.notice.warn{background:linear-gradient(135deg,#fff0f0,#ffe8e8);border-color:#f9bfbf;color:#7a1820;}
.notice.warn b{color:#9a0010;}
.sec-title{font-size:11.5px;font-weight:700;letter-spacing:.7px;color:var(--muted);text-transform:uppercase;margin:14px 3px 7px;}

/* TIMELINE */
.tl-card{background:var(--card);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow);margin-bottom:9px;overflow:hidden;}
.tl-head{display:grid;grid-template-columns:72px 1fr 30px;align-items:stretch;}
.tl-time{background:var(--sakura-l);border-right:2px solid var(--sakura);display:flex;align-items:center;justify-content:center;font-size:11.5px;font-weight:700;color:var(--rose);padding:12px 5px;text-align:center;line-height:1.3;}
.tl-body{padding:11px 10px 10px;}
.tl-body b{display:block;font-size:14px;margin-bottom:3px;line-height:1.35;}
.tl-body p{font-size:12.5px;color:var(--muted);line-height:1.4;}
.tl-toggle{display:flex;align-items:center;justify-content:center;padding-right:6px;color:#ddd;font-size:18px;transition:transform .2s;}
.tl-card.has-detail .tl-toggle{color:var(--rose);}
.tl-card.open .tl-toggle{transform:rotate(90deg);}
.tl-detail{display:none;border-top:1px solid var(--line);background:#fdfaf9;padding:10px 13px 12px;}
.tl-card.open .tl-detail{display:block;}
.tl-detail ul{padding-left:17px;margin:4px 0 0;}
.tl-detail li{font-size:12.5px;color:var(--muted);margin:5px 0;line-height:1.4;}
.tl-detail li b{color:var(--ink);font-size:12.5px;}
.map-btn{display:inline-flex;align-items:center;gap:5px;margin-top:8px;padding:6px 13px;background:var(--blue);color:#fff;border-radius:999px;font-size:12px;font-weight:600;border:none;box-shadow:0 2px 8px rgba(40,80,160,.2);}
.map-btn span{font-size:14px;}
.badge-row{display:flex;flex-wrap:wrap;gap:5px;margin-top:6px;}
.badge{display:inline-block;padding:3px 9px;border-radius:999px;font-size:11px;font-weight:600;}
.b-food{background:#fff0e6;color:#b04000;}
.b-sakura{background:#fff0f4;color:#b03060;}
.b-car{background:#eef4ff;color:#1a55b0;}
.b-free{background:#f0faf4;color:#1a7a50;}
.b-warn{background:#fff8e6;color:#905000;}
.b-alt{background:#f5f0ff;color:#5030a0;}
.b-shop{background:#fff5e0;color:#804000;}
.b-hotel{background:#e8f4ff;color:#104080;}

/* HOTEL CARD */
.hotel-card{background:var(--card);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow);margin-bottom:10px;overflow:hidden;}
.hotel-head{display:flex;align-items:center;gap:11px;padding:12px 13px;}
.hotel-icon{width:44px;height:44px;border-radius:12px;background:#eef4ff;display:flex;align-items:center;justify-content:center;font-size:22px;flex:0 0 44px;}
.hotel-info h3{font-size:14.5px;margin-bottom:2px;}
.hotel-info p{font-size:12px;color:var(--muted);}
.hotel-addr{padding:0 13px 12px;font-size:12px;color:var(--muted);line-height:1.5;}

/* RESTAURANT */
.rest-card{background:var(--card);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow);margin-bottom:11px;overflow:hidden;}
.rest-head{display:flex;align-items:center;gap:12px;padding:12px 13px 9px;}
.rest-icon{width:46px;height:46px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:23px;flex:0 0 46px;}
.rest-info h3{font-size:14.5px;margin-bottom:2px;}
.rest-info p{font-size:12px;color:var(--muted);}
.rest-tags{display:flex;flex-wrap:wrap;gap:5px;padding:0 13px 9px;}
.rest-tag{background:var(--sakura-l);border:1px solid var(--sakura);color:var(--rose);padding:3px 10px;border-radius:999px;font-size:11.5px;}
.rest-note{border-top:1px solid var(--line);background:#fdfaf9;padding:9px 13px;font-size:12.5px;color:var(--muted);}

/* CHECKLIST */
.check-section h3{font-size:14px;margin:14px 0 8px;padding-left:8px;border-left:3px solid var(--rose);font-weight:700;}
.check-wrap{background:var(--card);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow);overflow:hidden;margin-bottom:4px;}
.ci{display:flex;align-items:flex-start;gap:12px;padding:11px 13px;border-bottom:1px solid var(--line);}
.ci:last-child{border-bottom:none;}
.cbox{width:22px;height:22px;border-radius:6px;border:2px solid var(--line);flex:0 0 22px;display:flex;align-items:center;justify-content:center;font-size:13px;color:transparent;transition:all .2s;margin-top:1px;}
.ci.done .cbox{background:var(--green);border-color:var(--green);color:#fff;}
.ci.done .clabel{text-decoration:line-through;color:var(--muted);}
.clabel{font-size:13.5px;line-height:1.4;}
.csub{font-size:11.5px;color:var(--muted);margin-top:2px;}

/* BOTTOM NAV */
#nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:600px;display:flex;background:rgba(255,250,248,.94);backdrop-filter:blur(14px);border-top:1px solid var(--line);height:var(--nav-h);padding-bottom:var(--safe-b);z-index:100;}
.nb{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;border:none;background:transparent;color:var(--muted);font-size:10px;font-family:inherit;transition:color .15s;}
.nb .ni{font-size:21px;line-height:1;}
.nb.active{color:var(--rose);}

/* SAKURA REPORT */
.sakura-bar{height:6px;border-radius:999px;background:linear-gradient(90deg,var(--sakura),var(--rose));margin:6px 0;}
.date-row{display:flex;justify-content:space-between;font-size:11px;color:var(--muted);}
</style>
</head>

let curDay='d1', curScr='itinerary';

function renderDayBar(){
  const bar=document.getElementById('day-bar');
  bar.innerHTML=days.map(d=>`<button class="day-tab${d.id===curDay?' active':''}" data-day="${d.id}">${d.label}<br><span style="font-size:10px;font-weight:400">${d.wk}</span></button>`).join('');
  bar.querySelectorAll('.day-tab').forEach(b=>b.addEventListener('click',()=>{curDay=b.dataset.day;renderDayBar();renderTimeline();}));
}

function renderTimeline(){
  const d=days.find(x=>x.id===curDay);
  let h=`<div class="notice"><b>${d.label}（${d.wk}）${d.title}</b> — ${d.sub}</div>`;
  d.items.forEach((item,i)=>{
    const hasDet=item.detail&&item.detail.length>0;
    const hasMap=item.map;
    const exp=hasDet||hasMap;
    let bRow='';
    if(item.badges)bRow=`<div class="badge-row">${item.badges.map(b=>`<span class="badge ${b}">${{b_food:'🍽 餐飲',b_sakura:'🌸 賞櫻',b_car:'🚗 自駕',b_free:'🎟 景點',b_warn:'⚠️ 留意',b_alt:'🔄 備案',b_shop:'🛍 購物',b_hotel:'🏨 酒店'}[b]||b}</span>`).join('')}</div>`;
    h+=`<div class="tl-card${exp?' has-detail':''}">
<div class="tl-head">
<div class="tl-time">${item.time}</div>
<div class="tl-body"><b>${item.title}</b><p>${item.desc}</p>${bRow}</div>
<div class="tl-toggle">${exp?'›':''}</div>
</div>`;
    if(exp){
      let det='';
      if(item.detail)det=`<ul>${item.detail.map(x=>`<li>${x}</li>`).join('')}</ul>`;
      if(item.map)det+=mb(item.map,item.mapLabel);
      h+=`<div class="tl-detail">${det}</div>`;
    }
    h+=`</div>`;
  });
  document.getElementById('tl-content').innerHTML=h;
  document.querySelectorAll('.tl-card.has-detail .tl-head').forEach(hd=>hd.addEventListener('click',()=>hd.closest('.tl-card').classList.toggle('open')));
  document.getElementById('content').scrollTop=0;
}

<div class="rest-info"><h3>${r.name}</h3><p>${r.day} ${r.meal} · ${r.sub}</p></div></div>
<div class="rest-tags">${r.tags.map(t=>`<span class="rest-tag">${t}</span>`).join('')}</div>
<div class="rest-note">${r.note}<br>${mb(r.map,'查看位置')}</div>
</div>`;
  });
  document.getElementById('food-content').innerHTML=h;
}

function renderCheck(){
  const saved=JSON.parse(localStorage.getItem('nc26')||'{}');
  let h='';
  for(const[sec,items]of Object.entries(checks)){
    h+=`<div class="check-section"><h3>${sec}</h3><div class="check-wrap">`;
    items.forEach((it,i)=>{
      const k=sec+'_'+i;const done=saved[k]||false;
      h+=`<div class="ci${done?' done':''}" data-k="${k}"><div class="cbox">${done?'✓':''}</div><div><div class="clabel">${it.l}</div>${it.s?`<div class="csub">${it.s}</div>`:''}</div></div>`;
    });
    h+=`</div></div>`;
  }
  document.getElementById('check-content').innerHTML=h;
  document.querySelectorAll('.ci').forEach(ci=>ci.addEventListener('click',()=>{
    const k=ci.dataset.k;const d=ci.classList.toggle('done');
    ci.querySelector('.cbox').textContent=d?'✓':'';
    const s=JSON.parse(localStorage.getItem('nc26')||'{}');s[k]=d;localStorage.setItem('nc26',JSON.stringify(s));
  }));
}

function showScr(name){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('visible'));
  document.getElementById('screen-'+name).classList.add('visible');
  document.querySelectorAll('.nb').forEach(b=>b.classList.remove('active'));
  document.querySelector(`.nb[data-s="${name}"]`).classList.add('active');
  document.getElementById('day-bar').style.display=name==='itinerary'?'flex':'none';
  curScr=name;
  if(name==='food')renderFood();
  if(name==='check')renderCheck();
  if(name==='info')renderInfo();
  document.getElementById('content').scrollTop=0;
}
document.querySelectorAll('.nb').forEach(b=>b.addEventListener('click',()=>showScr(b.dataset.s)));
